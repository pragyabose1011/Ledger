server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Docker DNS resolver — required for variable-based proxy_pass (defers resolution to request time)
    resolver 127.0.0.11 valid=30s;

    # SPA fallback - all frontend routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket proxy for chat
    location /ws/ {
        set $backend_upstream http://ledger-backend:8000;
        proxy_pass $backend_upstream/ws/$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy API routes that have no frontend page conflict
    location ~ ^/(auth|meetings|extract|metrics|transcripts|rag|alerts|export|upload|uploads|notifications|decisions|action-items|integrations|live|oauth|messages|docs|openapi.json|api)(.*)$ {
        set $backend_upstream http://ledger-backend:8000;
        proxy_pass $backend_upstream/$1$2$is_args$args;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Proxy API routes that share a prefix with frontend pages — require subpath
    location ~ ^/(profile|colleagues|chat|billing)/.+ {
        set $backend_upstream http://ledger-backend:8000;
        proxy_pass $backend_upstream$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # Cache static files
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;
}
