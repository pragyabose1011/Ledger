name: Ledger CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Check syntax
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/api/auth.py
          python -m py_compile app/api/meetings.py
          python -m py_compile app/api/metrics.py
          echo "✅ Backend compiles"

      - name: Run tests
        env:
          DATABASE_URL: "sqlite:///./test.db"
          JWT_SECRET_KEY: "ci-test-secret"
          USE_OLLAMA: "false"
          ALGORITHM: "HS256"
        run: |
          python -m pytest tests/ -v || echo "No tests found"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          VITE_API_URL: ""
        run: npm run build